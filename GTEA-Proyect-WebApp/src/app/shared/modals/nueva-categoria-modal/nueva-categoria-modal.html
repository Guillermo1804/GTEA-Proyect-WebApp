<div class="modal-overlay" (click)="onCancel()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <!-- Header -->
        <div class="modal-header">
            <h2>Nueva Categoría</h2>
            <button class="close-btn" (click)="onCancel()">
                <span class="material-icons">close</span>
            </button>
        </div>

        <!-- Form -->
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Nombre</label>
                <input class="form-input" type="text" placeholder="Ej: Seminarios" [(ngModel)]="categoryName">
            </div>

            <div class="form-group">
                <label class="form-label">Descripción</label>
                <textarea class="form-textarea" rows="2" placeholder="Descripción de la categoría..."
                    [(ngModel)]="description"></textarea>
            </div>

            <!-- Color Picker -->
            <div class="form-group">
                <label class="form-label">Color</label>
                <div class="color-grid">
                    @for (color of colors; track color) {
                    <button class="color-swatch" [style.background]="color" [class.selected]="selectedColor === color"
                        (click)="selectColor(color)">
                        @if (selectedColor === color) {
                        <span class="material-icons check-icon">check</span>
                        }
                    </button>
                    }
                </div>
            </div>

            <!-- Icon Picker -->
            <div class="form-group">
                <label class="form-label">Ícono</label>
                <div class="icon-grid">
                    @for (item of icons; track item.icon) {
                    <button class="icon-option" [class.selected]="selectedIcon === item.icon"
                        [style.borderColor]="selectedIcon === item.icon ? selectedColor : 'transparent'"
                        (click)="selectIcon(item.icon)">
                        <span class="material-icons"
                            [style.color]="selectedIcon === item.icon ? selectedColor : '#6b7280'">{{ item.icon
                            }}</span>
                        <span class="icon-label">{{ item.label }}</span>
                    </button>
                    }
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
            <button class="btn-cancel" (click)="onCancel()">Cancelar</button>
            <button class="btn-save" (click)="onSave()" [style.background]="selectedColor">Guardar</button>
        </div>
    </div>
</div>
