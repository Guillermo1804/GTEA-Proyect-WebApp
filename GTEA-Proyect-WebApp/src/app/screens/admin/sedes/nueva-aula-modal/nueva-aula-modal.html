<div class="modal-overlay" (click)="onCancel()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <!-- Header -->
        <div class="modal-header">
            <h2>Nueva Aula</h2>
            <button class="close-btn" (click)="onCancel()">
                <span class="material-icons">close</span>
            </button>
        </div>

        <!-- Form -->
        <div class="modal-body">
            <!-- Sede Select -->
            <div class="form-group">
                <label class="form-label">Sede</label>
                <select class="form-select" [(ngModel)]="selectedSede">
                    <option value="" disabled>Seleccionar sede</option>
                    @for (sede of sedes; track sede) {
                    <option [value]="sede">{{ sede }}</option>
                    }
                </select>
            </div>

            <!-- Name Input -->
            <div class="form-group">
                <label class="form-label">Nombre del Aula</label>
                <input class="form-input" type="text" placeholder="Ej: Lab. Sistemas #3" [(ngModel)]="className">
            </div>

            <!-- Capacity Counter -->
            <div class="form-group">
                <label class="form-label">Capacidad</label>
                <div class="counter">
                    <button class="counter-btn" (click)="decrementCapacity()">
                        <span class="material-icons">remove</span>
                    </button>
                    <span class="counter-value">{{ capacity }}</span>
                    <button class="counter-btn" (click)="incrementCapacity()">
                        <span class="material-icons">add</span>
                    </button>
                </div>
            </div>

            <!-- Equipment Toggles -->
            <div class="form-group">
                <label class="form-label">Equipamiento</label>
                <div class="equipment-list">
                    @for (item of equipmentList; track item.name) {
                    <div class="equipment-item">
                        <div class="equipment-info">
                            <span class="material-icons equip-icon">{{ item.icon }}</span>
                            <span class="equip-name">{{ item.name }}</span>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" [checked]="item.enabled" (change)="toggleEquipment(item)">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    }
                </div>
            </div>

            <!-- Notes -->
            <div class="form-group">
                <label class="form-label">Notas adicionales</label>
                <textarea class="form-textarea" rows="3" placeholder="Observaciones..." [(ngModel)]="notes"></textarea>
            </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
            <button class="btn-cancel" (click)="onCancel()">Cancelar</button>
            <button class="btn-save" (click)="onSave()">Guardar</button>
        </div>
    </div>
</div>
