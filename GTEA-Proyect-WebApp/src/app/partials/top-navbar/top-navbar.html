<nav class="top-navbar">
    <div class="navbar-inner">
        <div class="brand">
            <div class="logo-tile">
                <span class="logo-text">GT</span>
            </div>
            <span class="brand-name">GTEA</span>
        </div>
        <div class="actions">
            @if (mode === 'auth') {
                <button class="icon-btn" (click)="onNotifications()" aria-label="Notificaciones">
                    <span class="material-icons">notifications</span>
                </button>
                <button class="icon-btn" (click)="onSettings()" aria-label="Configuración">
                    <span class="material-icons">settings</span>
                </button>
            } @else {
                <button class="cta-btn" (click)="navigate(ctaRoute)">{{ ctaLabel }}</button>
            }
        </div>
    </div>
</nav>
